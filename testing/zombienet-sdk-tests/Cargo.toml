[package]
name = "bridges-zombienet-sdk-tests"
version = "0.1.0"
description = "Bridges zombienet-sdk tests (Rococo <> Westend)."
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
# Only `tests/lib.rs` is an integration-test target; the other files in `tests/` are its modules.
autotests = false

[[test]]
name = "bridges"
path = "tests/lib.rs"

[dependencies]
# All deps are used only by the `zombie-ci`-gated test code, so all are `optional` and pulled in by
# that feature — a plain `cargo check`/`build` of the workspace builds none of them.
anyhow = { workspace = true, optional = true }
codec = { workspace = true, optional = true }
env_logger = { workspace = true, optional = true }
log = { workspace = true, optional = true }
serde_json = { workspace = true, default-features = true, optional = true }
subxt = { workspace = true, optional = true }
subxt-signer = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
# `zombienet-{orchestrator,provider,configuration,support,prom-metrics-parser}` aren't referenced
# directly; they pin the whole `zombienet-*` family to one `=0.4.14` line (an umbrella-only pin lets
# the sub-crates drift). This crate must also stay a workspace member, not `exclude`d: the 0.4.x graph
# needs `core2 0.4.0` (yanked), which Cargo only accepts because the workspace's polkadot-sdk deps
# already lock it.
zombienet-sdk = { workspace = true, optional = true }
zombienet-orchestrator = { workspace = true, optional = true }
zombienet-provider = { workspace = true, optional = true }
zombienet-configuration = { workspace = true, optional = true }
zombienet-support = { workspace = true, optional = true }
zombienet-prom-metrics-parser = { workspace = true, optional = true }

[features]
# Builds and runs the tests; activates the otherwise-optional deps above.
zombie-ci = [
	"dep:anyhow",
	"dep:codec",
	"dep:env_logger",
	"dep:log",
	"dep:serde_json",
	"dep:subxt",
	"dep:subxt-signer",
	"dep:tokio",
	"dep:zombienet-sdk",
	"dep:zombienet-orchestrator",
	"dep:zombienet-provider",
	"dep:zombienet-configuration",
	"dep:zombienet-support",
	"dep:zombienet-prom-metrics-parser",
]

# There is intentionally no build-time metadata generation: the typed clients under `tests/codegen/`
# are generated out-of-band by `testing/metadata-gen/generate.sh` and committed.
