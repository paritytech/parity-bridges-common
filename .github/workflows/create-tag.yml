name: Create Release Tag

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'runtime-update-')
    outputs:
      tag_name: ${{ steps.create-tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version and create tag
        id: create-tag
        run: |
          # Read relayer version from Cargo.toml (already bumped in the merged PR)
          relayer_version=$(grep '^version = ' substrate-relay/Cargo.toml | cut -d'"' -f2)
          tag_name="v${relayer_version}"

          # Extract runtime version from PR branch name (runtime-update-{name}-{version})
          branch="${{ github.event.pull_request.head.ref }}"
          runtime_version=$(echo "$branch" | sed 's/runtime-update-[^-]*-//')

          echo "Relayer version: $relayer_version"
          echo "Runtime version: $runtime_version"
          echo "Tag name: $tag_name"
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

          # Check if tag already exists
          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "Tag $tag_name already exists, skipping."
            exit 0
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "$tag_name" -m "Release $tag_name - Runtime: $runtime_version"
          git push origin "$tag_name"

  build:
    needs: create-tag
    uses: ./.github/workflows/build-tag.yml
    with:
      tag: ${{ needs.create-tag.outputs.tag_name }}
    secrets: inherit
